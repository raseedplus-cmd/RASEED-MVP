<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RASEED+ - محاكاة MVP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f6fc; /* خلفية فاتحة مثل الصورة قبل الأخيرة */
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      background-color: #6a0dad; /* اللون البنفسجي للشعار */
      color: white;
      padding: 20px 0;
      font-size: 1.8em;
      font-weight: bold;
    }
    .logo {
      margin-top: 15px;
    }
    .container {
      margin: 30px auto;
      width: 90%;
      max-width: 500px;
      background-color: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }
    .user-info {
      margin-bottom: 20px;
    }
    .user-info p {
      font-size: 1.1em;
      margin: 10px 0;
    }
    button {
      background-color: #6a0dad; /* البنفسجي */
      color: white;
      border: none;
      padding: 12px 20px;
      margin: 10px;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #8000ff; /* تدرج بسيط عند hover */
    }
    .message {
      margin-top: 20px;
      font-size: 1.1em;
      color: #6a0dad;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>RASEED+</header>
  <img src="logo.png" alt="RASEED+ Logo" class="logo" width="150">

  <div class="container">
    <div class="user-info">
      <p><strong>المستخدم:</strong> أحمد</p>
      <p><strong>استهلاك البيانات هذا الشهر:</strong> 3.5 جيجابايت</p>
      <p><strong>البيانات المتاحة:</strong> 5 جيجابايت</p>
      <p><strong>الفائض:</strong> 1.5 جيجابايت</p>
    </div>

    <button onclick="convertToPoints()">تحويل الفائض إلى نقاط ولاء</button>
    <button onclick="donateData()">تبرع بالفائض لخيري</button>

    <div class="message" id="message"></div>
  </div>

  <script>
    function convertToPoints() {
      const points = 1.5 * 10; // كل جيجابايت = 10 نقاط
      document.getElementById('message').textContent = 
        `تم تحويل 1.5 جيجابايت إلى ${points} نقاط ولاء!`;
    }

    function donateData() {
      const amount = 1.5 * 3; // كل جيجابايت = 3 ريال تبرع تقريبي
      document.getElementById('message').textContent = 
        `تم التبرع بـ 1.5 جيجابايت لصالح عمل خيري، قيمة التبرع: ${amount} ريال.`;
    }
  </script>

</body>
</html>
